spring:
  application:
    name: setaccio-lab
  ai:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}
      base-url: ${ANTHROPIC_BASE_URL:}
      chat:
        options:
          model: ${ANTHROPIC_MODEL:claude-haiku-4-5}
          max-tokens: ${ANTHROPIC_MAX_TOKENS:4096}
    ollama:
      base-url: ${OLLAMA_BASE_URL:${OLLAMA_API_BASE:http://localhost:11434}}
      chat:
        model: ${OLLAMA_MODEL:granite3.2-vision}

server:
  port: 8082
